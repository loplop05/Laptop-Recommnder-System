<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Laptop Advisor - Jordan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">💻 AI Laptop Advisor</div>
            <h1>Find your perfect match.</h1>
            <p>Our Deep Learning engine analyzes thousands of listings to find the best laptop for you.</p>
        </header>

        <main>
            <div id="wizard-container" class="wizard-card">
                <div class="progress-bar">
                    <div id="progress" class="progress" style="width: 20%;"></div>
                </div>

                <form id="recommend-form">
                    <!-- Step 1: Use Case -->
                    <div class="step active" data-step="1">
                        <h2>What will you use it for?</h2>
                        <div class="options-grid">
                            <label class="option-card">
                                <input type="radio" name="use_case" value="general" checked>
                                <div class="card-content">
                                    <span class="icon">🏠</span>
                                    <h3>General Use</h3>
                                    <p>Web browsing, movies, and light tasks.</p>
                                </div>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="use_case" value="work">
                                <div class="card-content">
                                    <span class="icon">💼</span>
                                    <h3>Work / Office</h3>
                                    <p>Excel, Zoom, and professional software.</p>
                                </div>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="use_case" value="gaming">
                                <div class="card-content">
                                    <span class="icon">🎮</span>
                                    <h3>Gaming</h3>
                                    <p>High FPS and powerful graphics.</p>
                                </div>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="use_case" value="content_creation">
                                <div class="card-content">
                                    <span class="icon">🎨</span>
                                    <h3>Creation</h3>
                                    <p>Video editing, 3D, and design.</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Step 2: Budget -->
                    <div class="step" data-step="2">
                        <h2>What is your maximum budget?</h2>
                        <div class="budget-input-container">
                            <span class="currency">JOD</span>
                            <input type="number" id="budget" name="budget" min="100" max="10000" value="800" required>
                        </div>
                        <p class="hint">We will never show you laptops above this price.</p>
                    </div>

                    <!-- Step 3: Performance -->
                    <div class="step" data-step="3">
                        <h2>How much power do you need?</h2>
                        <div class="options-grid">
                            <label class="option-card">
                                <input type="radio" name="performance" value="entry">
                                <div class="card-content">
                                    <h3>Entry Level</h3>
                                    <p>Basic speed for simple apps.</p>
                                </div>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="performance" value="medium" checked>
                                <div class="card-content">
                                    <h3>Balanced</h3>
                                    <p>Smooth for most users.</p>
                                </div>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="performance" value="high">
                                <div class="card-content">
                                    <h3>Powerhouse</h3>
                                    <p>No compromises on speed.</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Step 4: Portability & Screen -->
                    <div class="step" data-step="4">
                        <h2>Size & Portability</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Screen Size</label>
                                <select name="screen_size">
                                    <option value="13-14">13-14" (Portable)</option>
                                    <option value="15-16" selected>15-16" (Standard)</option>
                                    <option value="17+">17"+ (Large)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Portability</label>
                                <select name="portability">
                                    <option value="high">Ultra Light</option>
                                    <option value="medium" selected>Balanced</option>
                                    <option value="low">Heavy / Desktop replacement</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 1.5rem;">
                            <label>Preferred Brand</label>
                            <select name="brand">
                                <option value="Any">Any Brand</option>
                                <option value="Apple">Apple</option>
                                <option value="ASUS">ASUS</option>
                                <option value="Lenovo">Lenovo</option>
                                <option value="HP">HP</option>
                                <option value="Dell">Dell</option>
                            </label>
                        </div>
                    </div>

                    <div class="wizard-actions">
                        <button type="button" id="prev-btn" class="btn-secondary hidden">Back</button>
                        <button type="button" id="next-btn" class="btn-primary">Continue (Enter)</button>
                        <button type="submit" id="submit-btn" class="btn-primary hidden">Generate Recommendations (Enter)</button>
                    </div>
                </form>
            </div>

            <section id="results-section" class="results-section hidden">
                <div class="results-header">
                    <h2>Your AI Recommendations</h2>
                    <div class="model-info">Powered by <strong>Deep Learning Reasoning</strong></div>
                </div>
                <div id="recommendations-container" class="recommendations-grid"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 AI Laptop Advisor Jordan. Real-time prices from 4 major shops.</p>
            <button id="refresh-prices-btn">Sync Market Prices</button>
        </footer>
    </div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader-content">
            <div class="spinner"></div>
            <h3>Analyzing the market...</h3>
            <p>Our AI is comparing specs and prices to find your best match.</p>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
